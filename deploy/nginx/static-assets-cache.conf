# Include this file inside your `server { ... }` block.
# Example:
#   include /path/to/WebsiteOptimization/deploy/nginx/static-assets-cache.conf;

location ~* \.(?:css|js|mjs|png|jpe?g|gif|webp|svg|ico|avif|woff2?|ttf|otf|mp3|wav)$ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    access_log off;
    try_files $uri =404;
}
